[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
ignore_missing_imports = True

# Exclude migration files that cause duplicate module issues
exclude = migrations/

# Per-module options
[mypy-migrations.*]
ignore_errors = True

[mypy-migrations.migrations.*]
ignore_errors = True
