[tool:pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --asyncio-mode=auto
    --disable-warnings
    --no-header
    -p no:warnings
    --maxfail=1
    --durations=10
markers =
    unit: Unit tests
    integration: Integration tests
    api: API tests
    slow: Slow tests
    external: Tests that require external services (should be avoided)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore::FutureWarning
    ignore::RuntimeWarning
    ignore::sqlalchemy.exc.SAWarning
